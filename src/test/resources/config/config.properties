# OrangeHRM demo base URL
base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

#login credentials for OrangeHRM demo
valid.username=Admin
valid.password=admin123
invalid.username=wrong
invalid.password=wrong

# Browser name consumed by DriverFactory (e.g., chrome, firefox)
browser=firefox

# Headless mode default; can be overridden by -Dheadless=true/false later
headless=true

# Default explicit wait timeout (in seconds) used by WaitUtils
wait.timeout=15

# Whether to capture screenshots on test failure; can be overridden by -Dscreenshot.on.failure=true/false
screenshot.on.failure=true

# Whether to capture a screenshot after every step (independent of screenshot.on.failure);
# can be overridden by -Dscreenshot.on.every.step=true/false
screenshot.on.every.step=false

# Explicit wait timeout for element visibility; can be overridden by -Dexplicit.wait.timeout=20
explicit.wait.timeout=20

# Number of retries for failed tests; can be overridden by -Dretry.count=3
retry.count=1

# Path to store screenshots; can be overridden by -Dscreenshot.path=target/screenshots
screenshot.path=target/screenshots