name: Run Selenium Tests on OpenShift

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/oc-installer@v1
        with:
          oc_version: 'latest'

      - name: Log in to OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}

      # BuildConfig already points at this GitHub repo, so this just tells OpenShift to pull
      # and rebuild from the commit that triggered this workflow - same as `oc start-build`
      # done manually so far.
      - name: Trigger OpenShift build
        run: oc start-build selenium-tests --follow

      # Job's pod template is immutable, so a fresh run always needs delete-then-apply.
      - name: Remove previous test Job
        run: oc delete job selenium-test-run --ignore-not-found=true

      - name: Run tests as a new Job
        run: oc apply -f openshift/job.yaml

      # "Pending" counts as a non-empty phase, so a one-shot phase check isn't enough - the
      # container can still be ContainerCreating when oc logs -f is first attempted. Retry the
      # logs command itself until the container is actually up and streaming.
      - name: Stream test logs
        run: |
          for i in $(seq 1 30); do
            if oc logs -f job/selenium-test-run; then
              break
            fi
            echo "Container not ready yet, retrying in 5s..."
            sleep 5
          done

      # oc logs -f exits once the container finishes either way, so explicitly check the Job's
      # own completion condition to make this workflow step fail on test failures too.
      - name: Fail the workflow if the test Job didn't succeed
        run: oc wait --for=condition=complete job/selenium-test-run --timeout=600s
